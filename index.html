              placeholder='e.g. "L-shaped modular sofa for 400 sq ft living room"' />
            <button className="search-btn" onClick={run}>Search</button>
          </div>
          {loading && <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8 }}><div className="spinner" /><span className="status-text">{stage}</span></div>}
          {results.length > 0 && (
            <div style={{ marginTop: 4 }}>
              <div style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 10, color: "var(--muted)", marginBottom: 4, marginTop: 10 }}>
                {results.length} assets matched · ordered by geometric similarity
              </div>
              {results.map((r, i) => (
                <div key={i} className="result-row" style={{ animationDelay: `${i * 0.08}s` }}>
                  <div className="result-icon">{r.icon}</div>
                  <div style={{ flex: 1 }}>
                    <div className="result-title">{r.title}</div>
                    <div className="result-tags">{r.tags.map((t, j) => <span key={j} className="result-tag">{t}</span>)}</div>
                  </div>
                  <div className="result-score">{r.match}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function Slide7() {
      const steps = [
        { n: 1, title: "Vector Embeddings", desc: "Historical design assets and floor plans are converted into mathematical coordinates (vectors) — enabling geometric comparison at machine speed." },
        { n: 2, title: "Semantic Understanding", desc: "Our Smart Routing engine (leveraging models like GPT-4o) understands the intent and geometry behind the words — not just the spelling." },
        { n: 3, title: "High-Precision Matching", desc: "Using pgvector, the system retrieves the exact 3D asset matching the 2D requirement instantly, eliminating hours of manual digging." },
      ];
      return (
        <div style={{ padding: "36px 40px" }}>
          <div className="section-eyebrow">The AI Engine</div>
          <h2 className="slide-title">Engineering the Vision: <span className="title-accent">The Intelligent Query Layer</span></h2>
          <div className="divider" />
          <p style={{ fontSize: 16, color: "var(--muted)", marginBottom: 18, lineHeight: 1.7 }}>
            Traditional databases look for exact text matches. We don't use traditional searches.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
            {steps.map((s, i) => (
              <div key={i} className="step-row">
                <div className="step-num-box">{s.n}</div>
                <div><div className="step-title">{s.title}</div>
                  <p style={{ margin: 0, fontSize: 14, color: "var(--muted)", lineHeight: 1.65 }}>{s.desc}</p></div>
              </div>
            ))}
          </div>
          <SearchDemo />
        </div>
      );
    }

    function Slide8() {
      const deliverables = [
        { icon: "🛡️", title: "Technical Debt Prevention", text: "Discovering a mismatch in NAADI's factory logic after building the AI would cost lakhs in rework. We identify it now — before a single line of production code is written." },
        { icon: "🔗", title: "Security & Integration Mapping", text: "Identifying exact data flow vulnerabilities between Zoho, Tally, and the proposed Azure Lakehouse — with a remediation roadmap included." },
        { icon: "💎", title: "Investment Protection", text: "Spending ₹50K now ensures your ₹15L+ production budget is spent on a foundation that is guaranteed to execute — not on expensive course-corrections." },
      ];
      return (
        <div style={{ padding: "36px 40px" }}>
          <div className="section-eyebrow">Engagement Structure</div>
          <h2 className="slide-title">Phase 0: <span className="title-accent">The ₹50K Architecture Audit</span></h2>
          <div className="divider" />
          <p style={{ fontSize: 16, color: "var(--muted)", marginBottom: 20, lineHeight: 1.7 }}>
            <strong style={{ color: "var(--text)" }}>Professional Technical Engagement to Eliminate Project Risk.</strong> Most enterprise software initiatives fail due to <em>Data Friction</em> — systems that don't talk to each other or messy historical files.
          </p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(230px,1fr))", gap: 12, marginBottom: 18 }}>
            {deliverables.map((d, i) => (
              <div key={i} className="deliverable-card">
                <div className="del-icon-box">{d.icon}</div>
                <div><div className="del-title">{d.title}</div><div className="del-text">{d.text}</div></div>
              </div>
            ))}
          </div>
          <div className="fee-box">
            <div>
              <div className="fee-label">14-Day Deliverable · Fixed Scope · Fixed Fee</div>
              <div className="fee-desc">Architecture Blueprint + API Strategy + Phase 1 Production Proposal</div>
            </div>
            <div>
              <div style={{ fontFamily: "'Montserrat',sans-serif", fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: "rgba(255,255,255,0.35)", marginBottom: 3 }}>Total (incl. 18% GST)</div>
              <div className="fee-amount">₹59,000</div>
            </div>
          </div>
        </div>
      );
    }

    function Slide9() {
      const [checked, setChecked] = useState([false, false, false, false]);
      const actions = [
        { action: "Approval of the Phase 0 Audit Proposal", owner: "Vibrant Spaces Leadership", day: "Day 1" },
        { action: "Signing of NDA", owner: "Both Parties", day: "Day 1" },
        { action: "Provision of Read-Only system access to relevant databases/APIs", owner: "Vibrant Spaces IT Team", day: "Day 2–3" },
        { action: "Day-1 Kickoff of the 14-Day Technical Audit", owner: "Inzeph Engineering Team", day: "Day 3" },
      ];
      const toggle = i => setChecked(c => { const n = [...c]; n[i] = !n[i]; return n; });
      return (
        <div style={{ padding: "36px 40px" }}>
          <div className="section-eyebrow">Let's Begin</div>
          <h2 className="slide-title">Immediate <span className="title-accent">Next Steps</span></h2>
          <div className="divider" />
          <p style={{ fontSize: 16, color: "var(--muted)", marginBottom: 20 }}>Click each item to track confirmation status.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 9, marginBottom: 24 }}>
            {actions.map((a, i) => (
              <div key={i} className={`action-row ${checked[i] ? "done" : ""}`} onClick={() => toggle(i)}>
                <div className={`checkbox ${checked[i] ? "done" : ""}`}>&#10003;</div>
                <div style={{ flex: 1 }}>
                  <div className={`action-text ${checked[i] ? "done" : ""}`}>{a.action}</div>
                  <div className="action-owner">{a.owner}</div>
                </div>
                <div className="day-tag">{a.day}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            {/* <button className="btn-primary">Proceed to Phase 0 →</button> */}
            {/* <button className="btn-outline">Download Proposal</button> */}
            <span style={{ fontSize: 13, color: "var(--muted)", marginLeft: 4 }}>
              Questions? <strong style={{ color: "var(--navy)" }}>nandha@inzeph.com</strong>
            </span>
          </div>
        </div>
      );
    }

    const SLIDES_COMPS = [Slide1, Slide2, Slide3, Slide4, Slide5, Slide6, Slide7, Slide8, Slide9];

    function App() {
      const [current, setCurrent] = useState(0);
      const [animKey, setAnimKey] = useState(0);

      const goTo = idx => {
        if (idx < 0 || idx >= SLIDES_COMPS.length) return;
        setCurrent(idx); setAnimKey(k => k + 1);
      };

      useEffect(() => {
        const h = e => {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") goTo(current + 1);
          if (e.key === "ArrowLeft" || e.key === "ArrowUp") goTo(current - 1);
        };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
      }, [current]);

      const SlideComp = SLIDES_COMPS[current];
      const progress = ((current + 1) / SLIDES_COMPS.length) * 100;

      return (
        <React.Fragment>
          <style>{STYLES}</style>
          <div className="root">
            <div className="topbar">
              <button className="logo" onClick={() => goTo(0)}>IN<span>ZEPH</span>
                <span style={{ fontWeight: 500, fontSize: 14, color: "rgba(255,255,255,0.85)", marginLeft: 8, letterSpacing: "0.06em" }}>
                  × VIBRANT SPACES
                </span>
              </button>
              <div className="nav-dots">
                {SLIDES_COMPS.map((_, i) => (
                  <button key={i} className={`dot ${i === current ? "active" : ""}`} onClick={() => goTo(i)} title={SLIDE_LABELS[i]} />
                ))}
              </div>
              <div className="slide-counter">{String(current + 1).padStart(2, "0")} / {String(SLIDES_COMPS.length).padStart(2, "0")}</div>
            </div>

            <div className="slide-wrap">
              <div key={animKey} className="slide-body">
                <SlideComp goTo={goTo} />
              </div>
              {current > 0 && <button className="arrow-btn" style={{ left: 8 }} onClick={() => goTo(current - 1)}>&#8249;</button>}
              {current < SLIDES_COMPS.length - 1 && <button className="arrow-btn" style={{ right: 8 }} onClick={() => goTo(current + 1)}>&#8250;</button>}
            </div>

            <div className="bottombar">
              <div className="slide-label">{SLIDE_LABELS[current]}</div>
              <div className="progress-track"><div className="progress-fill" style={{ width: `${progress}%` }} /></div>
              <div className="nav-hint">← → to navigate</div>
            </div>
          </div>
        </React.Fragment>
      );
    }

    // Render the app using ReactDOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
