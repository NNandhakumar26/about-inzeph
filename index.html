    function Slide8() {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [active, setActive] = useState(false);
      const [loading, setLoading] = useState(false);
      const [loadStage, setLoadStage] = useState('');
      const [loadPct, setLoadPct] = useState(0);
      const [riskData, setRiskData] = useState(null);
      const [alerts, setAlerts] = useState([]);
      const poseRef = useRef(null);
      const cameraRef = useRef(null);
      const lastLevelRef = useRef('safe');

      useEffect(() => {
        return () => {
          if (cameraRef.current) { try { cameraRef.current.stop(); } catch (e) { } }
        };
      }, []);

      function computeRisk(landmarks) {
        const ls = landmarks[11], rs = landmarks[12];
        const lh = landmarks[23], rh = landmarks[24];
        const nose = landmarks[0];
        const smx = (ls.x + rs.x) / 2, smy = (ls.y + rs.y) / 2;
        const hmx = (lh.x + rh.x) / 2, hmy = (lh.y + rh.y) / 2;
        const dx = smx - hmx, dy = smy - hmy;
        const spineAngle = Math.abs(Math.atan2(dx, -dy) * 180 / Math.PI);
        const shoulderTilt = Math.abs(ls.y - rs.y) * 180;
        const headForward = Math.max(0, Math.abs(nose.x - smx) - 0.02) * 300;
        let score = 0;
        if (spineAngle > 45) score += 65;
        else if (spineAngle > 30) score += 40;
        else if (spineAngle > 18) score += 18;
        else score += spineAngle * 0.4;
        score += Math.min(22, shoulderTilt * 1.2);
        score += Math.min(18, headForward * 0.4);
        score = Math.min(100, Math.round(score));
        let level = 'safe';
        if (score >= 68) level = 'crit';
        else if (score >= 38) level = 'warn';
        return { score, spineAngle: Math.round(spineAngle), shoulderTilt: Math.round(shoulderTilt), level };
      }

      function onResults(results) {
        const video = videoRef.current;
        const canvas = canvasRef.current;
        if (!video || !canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || canvas.offsetWidth;
        canvas.height = video.videoHeight || canvas.offsetHeight;
        ctx.save();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (results.poseLandmarks && results.poseLandmarks.length > 0) {
          const lms = results.poseLandmarks;
          const risk = computeRisk(lms);
          const connColor = risk.level === 'safe' ? '#16A34A' : risk.level === 'warn' ? '#E8861A' : '#DC2626';
          const dotColor = risk.level === 'safe' ? '#4ADE80' : risk.level === 'warn' ? '#FCD34D' : '#FCA5A5';
          drawConnectors(ctx, lms, POSE_CONNECTIONS, { color: connColor, lineWidth: 2.5 });
          drawLandmarks(ctx, lms, { color: dotColor, lineWidth: 1, radius: 3.5, fillColor: 'rgba(0,0,0,0.4)' });
          setRiskData(risk);
          if (risk.level !== lastLevelRef.current) {
            const now = new Date();
            const ts = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2, '0')).join(':');
            const msg = risk.level === 'warn' ? `Posture Risk — spine ${risk.spineAngle}° lean`
              : risk.level === 'crit' ? `CRITICAL: Posture Collapse — ${risk.spineAngle}°`
                : 'Worker posture restored to safe position';
            setAlerts(prev => [{ ts, msg, level: risk.level }, ...prev].slice(0, 5));
            lastLevelRef.current = risk.level;
          }
        }
        ctx.restore();
      }

      function stopDemo() {
        if (cameraRef.current) { try { cameraRef.current.stop(); } catch (e) { } cameraRef.current = null; }
        if (poseRef.current) { try { poseRef.current.close(); } catch (e) { } poseRef.current = null; }
        setActive(false);
        setRiskData(null);
        lastLevelRef.current = 'safe';
      }

      async function startDemo() {
        setLoading(true);
        const stages = [
          ['Requesting camera access...', 15],
          ['Loading BlazePose model (33-pt skeleton)...', 40],
          ['Calibrating pose estimator...', 70],
          ['Launching edge inference engine...', 90],
          ['Live inference active ✓', 100],
        ];
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          stream.getTracks().forEach(t => t.stop());
          for (const [stage, pct] of stages) {
            setLoadStage(stage); setLoadPct(pct);
            await new Promise(r => setTimeout(r, 380));
          }
          poseRef.current = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
          poseRef.current.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });
          poseRef.current.onResults(onResults);
          cameraRef.current = new Camera(videoRef.current, {
            onFrame: async () => { await poseRef.current.send({ image: videoRef.current }); },
            width: 1280, height: 720,
          });
          await cameraRef.current.start();
          setLoading(false);
          setActive(true);

          setLoadStage('Camera access denied — allow camera in your browser and retry.');

            ].map((d, i) => (
              <div key={i} style={{ display: "flex", gap: 12, background: "var(--white)", border: "1px solid var(--border)", borderRadius: 8, padding: "14px 16px", boxShadow: "var(--card-shadow)" }}>
                <div style={{ width: 34, height: 34, background: "#EEF4FF", border: "1px solid #C5D5F0", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>{d.icon}</div>
                <div>
                  <div style={{ fontFamily: "'Montserrat',sans-serif", fontWeight: 700, fontSize: 13, color: "var(--navy-dark)", marginBottom: 4 }}>{d.title}</div>
                  <div style={{ fontSize: 13, color: "var(--text)", lineHeight: 1.55 }}>{d.text}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Live demo card */}
          <div style={{ background: "var(--white)", border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden", boxShadow: "var(--card-shadow)" }}>

            {/* Card header */}
            <div style={{ background: "linear-gradient(90deg, #163672 0%, #1e4896 100%)", padding: "10px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>

                          {a.level === 'safe' ? '■' : a.level === 'warn' ? '▲' : '●'} {a.level === 'safe' ? 'Restored' : a.level === 'warn' ? 'Risk' : 'Critical'}
                        </span>
                        <span style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 8, color: "var(--muted)" }}>{a.ts}</span>
                      </div>
                      <div style={{ fontFamily: "'IBM Plex Mono',monospace", fontSize: 9, color: "var(--muted)" }}>{a.msg}</div>
                    </div>
                  ))}
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    function Slide9() {
      const [checked, setChecked] = useState([false, false]);
      const actions = [
        { action: "Execute NDA & Data Sharing Agreement", owner: "Both Parties", day: "Day 1" },
        { action: "Confirm further Engagement & Sign Off", owner: "Client Leadership", day: "Day 2" },
      ];
      const toggle = i => setChecked(c => { const n = [...c]; n[i] = !n[i]; return n; });
      return (
        <div style={{ padding: "36px 40px" }}>
          <div className="section-eyebrow">Move Forward</div>
          <h2 className="slide-title">From PoC to <span className="title-accent">Production</span></h2>
          <div className="divider" />
          <p style={{ fontSize: 16, color: "var(--muted)", marginBottom: 20, lineHeight: 1.7 }}>
            You've seen the technology work in real-time. Here's how we move from live demo to factory-floor deployment.
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 9, marginBottom: 24 }}>
            {actions.map((a, i) => (
              <div key={i} className={`action-row ${checked[i] ? "done" : ""}`} onClick={() => toggle(i)}>
                <div className={`checkbox ${checked[i] ? "done" : ""}`}>&#10003;</div>
                <div style={{ flex: 1 }}>
                  <div className={`action-text ${checked[i] ? "done" : ""}`}>{a.action}</div>
                  <div className="action-owner">{a.owner}</div>
                </div>
                <div className="day-tag">{a.day}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>

            <span style={{ fontSize: 13, color: "var(--muted)", marginLeft: 4 }}>
              Questions? <strong style={{ color: "var(--navy)" }}>nandha@inzeph.com</strong>
            </span>
          </div>
        </div>
      );
    }

    const SLIDES_COMPS = [Slide1, Slide2, Slide3, Slide4, SlideArchIntel, Slide5, Slide7, Slide8, Slide9];

    function App() {
      const [current, setCurrent] = useState(0);
      const [animKey, setAnimKey] = useState(0);

      const goTo = idx => {
        if (idx < 0 || idx >= SLIDES_COMPS.length) return;
        setCurrent(idx); setAnimKey(k => k + 1);
      };

      useEffect(() => {
        const h = e => {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") goTo(current + 1);
          if (e.key === "ArrowLeft" || e.key === "ArrowUp") goTo(current - 1);
        };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
      }, [current]);

      const SlideComp = SLIDES_COMPS[current];
      const progress = ((current + 1) / SLIDES_COMPS.length) * 100;

      return (
        <React.Fragment>
          <style>{STYLES}</style>
          <div className="root">
            <div className="topbar">
              <button className="logo" onClick={() => goTo(0)}>IN<span>ZEPH</span></button>
              <div className="nav-dots">
                {SLIDES_COMPS.map((_, i) => (
                  <button key={i} className={`dot ${i === current ? "active" : ""}`} onClick={() => goTo(i)} title={SLIDE_LABELS[i]} />
                ))}
              </div>
              <div className="slide-counter">{String(current + 1).padStart(2, "0")} / {String(SLIDES_COMPS.length).padStart(2, "0")}</div>
            </div>

            <div className="slide-wrap">
              <div key={animKey} className="slide-body">
                <SlideComp goTo={goTo} />
              </div>
              {current > 0 && <button className="arrow-btn" style={{ left: 8 }} onClick={() => goTo(current - 1)}>&#8249;</button>}
              {current < SLIDES_COMPS.length - 1 && <button className="arrow-btn" style={{ right: 8 }} onClick={() => goTo(current + 1)}>&#8250;</button>}
            </div>

            <div className="bottombar">
              <div className="slide-label">{SLIDE_LABELS[current]}</div>
              <div className="progress-track"><div className="progress-fill" style={{ width: `${progress}%` }} /></div>
              <div className="nav-hint">← → to navigate</div>
            </div>
          </div>
        </React.Fragment>
      );
    }

    // Render the app using ReactDOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
