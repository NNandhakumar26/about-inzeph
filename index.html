        const SLIDES_COMPS = [Slide1, Slide2, Slide3, Slide4, Slide5, Slide6, Slide7, Slide8, Slide9];

        function App() {
          const [current, setCurrent] = useState(0);
          const [animKey, setAnimKey] = useState(0);

          const goTo = idx => {
            if (idx < 0 || idx >= SLIDES_COMPS.length) return;
            setCurrent(idx); setAnimKey(k => k + 1);
          };

          useEffect(() => {
            const h = e => {
              if (e.key === "ArrowRight" || e.key === "ArrowDown") goTo(current + 1);
              if (e.key === "ArrowLeft" || e.key === "ArrowUp") goTo(current - 1);
            };
            window.addEventListener("keydown", h);
            return () => window.removeEventListener("keydown", h);
          }, [current]);

          const SlideComp = SLIDES_COMPS[current];
          const progress = ((current + 1) / SLIDES_COMPS.length) * 100;

          return (
            <React.Fragment>
              <style>{STYLES}</style>
              <div className="root">
                <div className="topbar">
                  <div className="logo">IN<span>ZEPH</span>
                    <span style={{ fontWeight: 400, fontSize: 10, color: "rgba(255,255,255,0.3)", marginLeft: 8, letterSpacing: "0.06em" }}>
                      × VIBRANT SPACES
                    </span>
                  </div>
                  <div className="nav-dots">
                    {SLIDES_COMPS.map((_, i) => (
                      <button key={i} className={`dot ${i === current ? "active" : ""}`} onClick={() => goTo(i)} title={SLIDE_LABELS[i]} />
                    ))}
                  </div>
                  <div className="slide-counter">{String(current + 1).padStart(2,"0")} / {String(SLIDES_COMPS.length).padStart(2,"0")}</div>
                </div>

                <div className="slide-wrap">
                  <div key={animKey} className="slide-body">
                    <SlideComp goTo={goTo} />
                  </div>
                  {current > 0 && <button className="arrow-btn" style={{ left: 8 }} onClick={() => goTo(current - 1)}>&#8249;</button>}
                  {current < SLIDES_COMPS.length - 1 && <button className="arrow-btn" style={{ right: 8 }} onClick={() => goTo(current + 1)}>&#8250;</button>}
                </div>

                <div className="bottombar">
                  <div className="slide-label">{SLIDE_LABELS[current]}</div>
                  <div className="progress-track"><div className="progress-fill" style={{ width: `${progress}%` }} /></div>
                  <div className="nav-hint">← → to navigate</div>
                </div>
              </div>
            </React.Fragment>
          );
        }

        // Render the app using ReactDOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
